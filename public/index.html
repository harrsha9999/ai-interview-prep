<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Interview Prep</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; padding: 32px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .sub { color: #8b949e; margin-bottom: 22px; font-size: 0.9rem; }
    select, textarea, button { font-size: 0.95rem; }
    select { background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 9px 12px; }
    .q { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; margin: 16px 0; font-size: 1.05rem; }
    textarea { width: 100%; min-height: 120px; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 10px; padding: 12px; resize: vertical; }
    button { background: #238636; color: #fff; border: 0; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    button.secondary { background: #21262d; border: 1px solid #30363d; }
    .score { font-size: 2.2rem; font-weight: 800; margin-top: 18px; }
    .score small { font-size: 0.9rem; color: #8b949e; font-weight: 400; }
    h3 { font-size: 0.9rem; margin: 14px 0 6px; color: #8b949e; }
    ul { margin-left: 18px; } li { margin-bottom: 5px; }
    .feedback { display: none; }
    footer { margin-top: 30px; color: #8b949e; font-size: 0.85rem; }
    a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AI Interview Prep</h1>
    <div class="sub">Pick a topic, answer the question, get scored feedback.</div>

    <select id="topic"></select>
    <button id="next" class="secondary">Get question</button>

    <div class="q" id="question" style="display:none"></div>

    <textarea id="answer" placeholder="Type your answer..." style="display:none"></textarea>
    <br/>
    <button id="submit" style="display:none">Submit answer</button>

    <div class="feedback" id="feedback">
      <div class="score" id="score">0<small>/100</small></div>
      <h3>Strengths</h3><ul id="strengths"></ul>
      <h3>Gaps</h3><ul id="gaps"></ul>
    </div>

    <footer>Built by <a href="https://linkedin.com/in/haarsha9999">Harsha Vardhan G</a> ·
      <a href="https://github.com/harrsha9999/ai-interview-prep">Source</a></footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let asked = [], current = null;

    (async () => {
      const { topics } = await (await fetch("/api/topics")).json();
      $("topic").innerHTML = topics.map((t) => `<option value="${t}">${t}</option>`).join("");
    })();

    $("next").onclick = async () => {
      const topic = $("topic").value;
      const res = await fetch("/api/question", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic, asked }),
      });
      const data = await res.json();
      if (!res.ok) { $("question").style.display = "block"; $("question").textContent = data.error; return; }
      current = data; asked.push(data.id);
      $("question").style.display = "block"; $("question").textContent = data.q;
      $("answer").style.display = "block"; $("answer").value = "";
      $("submit").style.display = "inline-block";
      $("feedback").style.display = "none";
    };

    $("submit").onclick = async () => {
      if (!current) return;
      const res = await fetch("/api/evaluate", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic: $("topic").value, id: current.id, answer: $("answer").value }),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error); return; }
      $("feedback").style.display = "block";
      $("score").innerHTML = data.score + '<small>/100</small>';
      $("strengths").innerHTML = (data.strengths.length ? data.strengths : ["—"]).map((s) => `<li>${s}</li>`).join("");
      $("gaps").innerHTML = (data.gaps.length ? data.gaps : ["—"]).map((s) => `<li>${s}</li>`).join("");
    };
  </script>
</body>
</html>
